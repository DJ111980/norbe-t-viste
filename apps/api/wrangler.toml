name = "norbe-t-viste-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
CORS_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

# Vinculacion local para desarrollo con D1. El database_id es un marcador local;
# cuando se cree la base remota en Cloudflare debe reemplazarse por el ID real.
[[d1_databases]]
binding = "DB"
database_name = "norbe-t-viste"
database_id = "local-norbe-t-viste"
migrations_dir = "../../db/migrations"

# Binding local/staging para Cloudflare R2. El bucket debe existir en la cuenta
# real de Cloudflare antes de usar staging/remoto.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "norbe-t-viste-dev-assets"

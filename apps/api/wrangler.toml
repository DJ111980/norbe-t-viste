name = "norbe-t-viste-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
CORS_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

# Vinculacion local para desarrollo con D1. El database_id es un marcador local;
# cuando se cree la base remota en Cloudflare debe reemplazarse por el ID real.
[[d1_databases]]
binding = "DB"
database_name = "norbe-t-viste"
database_id = "local-norbe-t-viste"
migrations_dir = "../../db/migrations"

# Binding esperado para Cloudflare R2:
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "NOMBRE_REAL_DEL_BUCKET"
#
# El bucket real se define al crear el recurso en Cloudflare. No se incluye un
# nombre inventado para evitar subir configuracion falsa al repositorio.

name = "norbe-t-viste-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
CORS_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

# Vinculacion local para desarrollo con D1. El database_id es un marcador local;
# cuando se cree la base remota en Cloudflare debe reemplazarse por el ID real.
[[d1_databases]]
binding = "DB"
database_name = "norbe-t-viste"
database_id = "local-norbe-t-viste"
migrations_dir = "../../db/migrations"

# Binding local/staging para Cloudflare R2. El bucket debe existir en la cuenta
# real de Cloudflare antes de usar staging/remoto.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "norbe-t-viste-dev-assets"

[env.staging]
name = "norbe-t-viste-api-staging"

[env.staging.vars]
APP_ENV = "staging"
BUSINESS_TIMEZONE = "America/Bogota"
CORS_ORIGINS = "https://norbe-t-viste-web-staging.pages.dev"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "norbe-t-viste-staging-db"
database_id = "49198e3b-9fa0-4b48-89d2-97e789db0416"
migrations_dir = "../../db/migrations"

[[env.staging.r2_buckets]]
binding = "BUCKET"
bucket_name = "norbe-t-viste-staging-assets"

[env.production]
name = "norbe-t-viste-api-production"

[env.production.vars]
APP_ENV = "production"
BUSINESS_TIMEZONE = "America/Bogota"
CORS_ORIGINS = "https://norbe-t-viste-web-production.pages.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "norbe-t-viste-production-db"
database_id = "bf514108-0b9c-434b-a595-f2a826e9fa40"
migrations_dir = "../../db/migrations"

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "norbe-t-viste-production-assets"
